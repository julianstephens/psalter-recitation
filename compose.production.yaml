services:
  api:
    environment:
      XDG_DATA_HOME: /data
      PSALTER_LOG_LEVEL: WARNING
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.production
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8080:80"
    restart: unless-stopped
