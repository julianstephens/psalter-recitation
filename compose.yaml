services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      XDG_DATA_HOME: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - psalter-data:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy

volumes:
  psalter-data:
