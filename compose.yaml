services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      XDG_DATA_HOME: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - 8000:8000
    volumes:
      - psalter-data:/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: "http://api:8000"
    ports:
      - 5173:5173
      - 4173:4173
    depends_on:
      api:
        condition: service_healthy

volumes:
  psalter-data:
