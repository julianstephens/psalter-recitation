services:
  api:
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "psalter.web.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      XDG_DATA_HOME: /data
      PSALTER_LOG_LEVEL: DEBUG
      PSALTER_SCRIPTURE_PROVIDER: mock
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - psalter-data:/data

  web:
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
